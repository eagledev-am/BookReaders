services:
  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: abdomagdy/bookreaders-app:latest
    container_name: bookreaders-app
    ports:
      - "8088:8080"
    environment:
      # Remote Database Configuration
      DB_SOURCE_URL: ${DB_URL}
      DB_SOURCE_USERNAME: ${DB_USER}
      DB_SOURCE_PASSWORD: ${DB_PASSWORD}

      # Remote RabbitMQ Configuration
      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VIRTUAL_HOST}
      SPRING_RABBITMQ_SSL_ENABLED: ${RABBITMQ_SSL_ENABLED}
      APPLICATION_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      APPLICATION_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}

      # Mail Configuration
      APPLICATION_MAIL_USERNAME: ${MAIL_USERNAME}
      APPLICATION_MAIL_PASSWORD: ${MAIL_PASSWORD}

      # Admin Configuration
      AMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      # JWT Configuration
      APPLICATION_SECURITY_JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      APPLICATION_SECURITY_JWT_EXPIRATION: 86400000

      # Base URL
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8088}

      # File Upload Configuration
      APPLICATION_FILE_UPLOAD_DIR: /app/uploads
    volumes:
      - ./uploads:/app/uploads
    networks:
      - bookreaders-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8088/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  bookreaders-network:
    driver: bridge


