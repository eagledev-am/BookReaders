<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Verify Email</title>
</head>
<body>
<div style="font-family: Arial, sans-serif; width: 80%; margin: auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px;">
    <div style="text-align: center; padding: 10px; background-color: #f8f8f8; border-bottom: 1px solid #ddd;">
        <h1>Welcome to Book Readers</h1>
    </div>
    <div style="padding: 20px;">
        <p>
            Dear, <span th:text="${name}">User</span>
        </p>
        <p>
            Thank you for registering book readers. Please use one time code to verify your email:
        </p>
        <p>
            <b th:text="${code}">123456</b>
        </p>
        <p>
            If you did not register, please ignore this email.
        </p>
        <p>Best Regards,</p>
    </div>
</div>
</body>
</html>
