<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
</head>
<body>

<div style="font-family: Arial, sans-serif; width: 80%; margin: auto; padding: 20px;
            border: 1px solid #ddd; border-radius: 5px;">

    <div style="text-align: center; padding: 10px;
                background-color: #f8f8f8; border-bottom: 1px solid #ddd;">
        <h1>Reset Your Password</h1>
    </div>

    <div style="padding: 20px;">
        <p>
            Dear, <span th:text="${name}">User</span>
        </p>

        <p>
            We received a request to reset your password for your
            <b>Book Readers</b> account.
        </p>

        <p>
            Please use the one-time code below to reset your password:
        </p>

        <p>
            <b th:text="${code}">123456</b>
        </p>

        <p>
            This code will expire in
            <b><span th:text="${expireMinutes}">15</span> minutes</b>.
        </p>

        <p>
            If you did not request a password reset, please ignore this email.
        </p>

        <p>Best Regards,</p>
    </div>

</div>

</body>
</html>
