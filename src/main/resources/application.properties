spring.application.name=bookreaders
spring.config.import=classpath:env.properties

spring.datasource.url=${DB_SOURCE_URL:${db.source.url}}
spring.datasource.username=${DB_SOURCE_USERNAME:${db.source.username}}
spring.datasource.password=${DB_SOURCE_PASSWORD:${db.source.password}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=50

# Specify the path of the OpenAPI documentation
springdoc.api-docs.path=/api-docs

springdoc.api-docs.version=OPENAPI_3_1

# Specify the path of the Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true

# RabbitMq
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.virtual-host=${SPRING_RABBITMQ_VIRTUAL_HOST:/}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${APPLICATION_RABBITMQ_USERNAME:${application.rabbitmq.username}}
spring.rabbitmq.password=${APPLICATION_RABBITMQ_PASSWORD:${application.rabbitmq.password}}
spring.rabbitmq.connection-timeout=30000
spring.rabbitmq.requested-heartbeat=30
#spring.rabbitmq.ssl.enabled=${SPRING_RABBITMQ_SSL_ENABLED:false}

# mail config
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${APPLICATION_MAIL_USERNAME:${application.mail.username}}
spring.mail.password=${APPLICATION_MAIL_PASSWORD:${application.mail.password}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


application.file.upload-dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT Configuration
application.security.jwt.secret-key=${APPLICATION_SECURITY_JWT_SECRET_KEY:${application.security.jwt.secret-key}}
application.security.jwt.expiration=${APPLICATION_SECURITY_JWT_EXPIRATION:${application.security.jwt.expiration}}

# Base URL
app.base-url=${APP_BASE_URL:${app.base-url}}

app.admin.email=${ADMIN_EMAIL:${amin_email}}
app.admin.password=${ADMIN_PASSWORD:${admin_password}}
